<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana'a Network Status | Live Monitoring</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0b1120 0%, #0a0f1a 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .network-card {
            max-width: 760px;
            width: 100%;
            background: rgba(12, 18, 28, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            border: 1px solid rgba(66, 212, 182, 0.3);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .status-header {
            background: rgba(0,0,0,0.5);
            padding: 1.4rem 2rem;
            border-bottom: 1px solid rgba(66,212,182,0.3);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .title-section h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff, #2dd4bf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .badge-live {
            background: #0f2c2a;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #2dd4bf;
        }
        .network-table { width: 100%; border-collapse: collapse; }
        .network-table th {
            text-align: left;
            padding: 1.2rem 1.5rem 0.7rem 1.8rem;
            font-size: 0.7rem;
            color: #6d86a8;
            border-bottom: 1px solid rgba(45,212,191,0.2);
        }
        .network-table td {
            padding: 1rem 1.5rem 1rem 1.8rem;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(45,212,191,0.08);
            color: #eef4ff;
        }
        .service-name { font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .indicator { width: 8px; height: 8px; border-radius: 10px; display: inline-block; }
        .indicator.green { background: #2dd4bf; box-shadow: 0 0 6px #2dd4bf; }
        .indicator.yellow { background: #facc15; box-shadow: 0 0 5px #facc15; }
        .indicator.red { background: #f87171; box-shadow: 0 0 5px #f87171; }
        .ping-value {
            font-family: monospace;
            background: #0f1620;
            padding: 0.2rem 0.6rem;
            border-radius: 28px;
            font-size: 0.8rem;
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 0.2rem 0.65rem;
            border-radius: 40px;
            display: inline-block;
        }
        .status-badge.stable { background: #0b2a2a; color: #5eead4; }
        .status-badge.unstable { background: #2c1f1a; color: #fda4af; }
        .status-badge.moderate { background: #2a281c; color: #fde047; }
        .status-badge.perfect { background: #0b2a2a; color: #a7f3d0; }
        .footer-note {
            background: #03060c70;
            padding: 0.9rem 2rem;
            border-top: 1px solid rgba(66,212,182,0.15);
            font-size: 0.7rem;
            color: #5e7897;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 580px) {
            .network-table th, .network-table td { padding: 0.8rem 1rem; }
            .status-header { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="network-card">
    <div class="status-header">
        <div class="title-section">
            <h1>Sana'a Network Status <span class="badge-live">LIVE</span></h1>
        </div>
    </div>
    <table class="network-table">
        <thead><tr><th>Service</th><th>Latency</th><th>Status</th><th>Info</th></tr></thead>
        <tbody>
            <tr><td class="service-name"><span class="indicator green"></span>yemen.net.ye (IPv4)</td><td><span class="ping-value">43 ms</span></td><td><span class="status-badge stable">● stable</span></td><td>uptime: 99.2%</td></tr>
            <tr><td class="service-name"><span class="indicator red"></span>yemen.net.ye (IPv6)</td><td><span class="ping-value" style="background:#261a1f;">timeout</span></td><td><span class="status-badge unstable">⚠️ unstable</span></td><td>status: partial</td></tr>
            <tr><td class="service-name"><span class="indicator yellow"></span>tele-yemen.com</td><td><span class="ping-value">67 ms</span></td><td><span class="status-badge moderate">◔ moderate</span></td><td>uptime: 97.8%</td></tr>
            <tr><td class="service-name"><span class="indicator green"></span>local gateway</td><td><span class="ping-value" style="background:#0e2a24;">2 ms</span></td><td><span class="status-badge perfect">★ perfect</span></td><td>latency: A+</td></tr>
        </tbody>
    </table>
    <div class="footer-note"><span>🔄 live simulation — Sana'a IXP</span><span>📡 realtime metrics</span></div>
</div>
</body>
</html>
